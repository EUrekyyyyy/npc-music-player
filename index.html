<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>智能体手机</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, 'SF Pro Display', 'PingFang SC', sans-serif;
  height: 100vh; width: 100vw;
  overflow: hidden;
  color: white;
  -webkit-font-smoothing: antialiased;
  display: flex;
  justify-content: center;
  background: #000;
}

.phone {
  width: 100%;
  max-width: 430px;
  height: 100vh;
  position: relative;
  overflow: hidden;
}

/* Wallpaper */
.wallpaper {
  position: absolute; inset: 0;
  background: url('https://i.imgur.com/placeholder.jpg') center/cover no-repeat;
  /* Fallback gradient resembling anime wallpaper */
  background: linear-gradient(180deg, #87AEBF 0%, #B8C8D4 30%, #D4C5A9 60%, #C0C4CC 100%);
  z-index: 0;
}

/* Status bar */
.status-bar {
  position: relative; z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 24px 0;
  font-size: 15px;
  font-weight: 600;
  color: #1a1a1a;
}
.status-right {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px;
}

/* Top-right action buttons */
.top-actions {
  position: absolute;
  top: 48px; right: 20px;
  z-index: 10;
  display: flex; gap: 10px;
}
.top-actions button {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(10px);
  color: white;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
}

/* Clock */
.clock-area {
  position: relative; z-index: 10;
  text-align: center;
  margin-top: 40px;
}
.clock-time {
  font-size: 72px;
  font-weight: 700;
  letter-spacing: -2px;
  text-shadow: 0 2px 12px rgba(0,0,0,0.15);
  line-height: 1;
}
.clock-sub {
  font-size: 14px;
  margin-top: 6px;
  opacity: 0.85;
  text-shadow: 0 1px 6px rgba(0,0,0,0.2);
}

/* Content area */
.content {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  padding: 0 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* Widget row */
.widget-row {
  display: flex;
  gap: 10px;
}

/* Music widget */
.music-widget {
  flex: 1.3;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 14px;
  cursor: pointer;
  transition: transform 0.15s;
  min-height: 120px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.music-widget:active { transform: scale(0.97); }

.music-widget-top {
  display: flex;
  align-items: center;
  gap: 10px;
}
.music-widget-avatar {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
  overflow: hidden;
}
.music-widget-avatar img {
  width: 100%; height: 100%;
  object-fit: cover;
}
.music-widget-title {
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  opacity: 0.9;
}

.music-widget-controls {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-top: 8px;
}
.music-widget-controls span {
  font-size: 20px;
  opacity: 0.8;
  cursor: pointer;
}

/* Updating state */
.music-widget.updating {
  pointer-events: none;
}
.music-widget-updating {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  height: 100%;
}
.music-widget.updating .music-widget-top,
.music-widget.updating .music-widget-controls { display: none; }
.music-widget.updating .music-widget-updating { display: flex; }

.updating-spinner {
  width: 32px; height: 32px;
  border: 3px solid rgba(255,255,255,0.15);
  border-top-color: rgba(255,255,255,0.8);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.updating-text {
  font-size: 13px;
  opacity: 0.7;
}

.updating-progress {
  width: 80%;
  height: 3px;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
  overflow: hidden;
}
.updating-progress-fill {
  height: 100%;
  background: rgba(255,255,255,0.7);
  border-radius: 2px;
  width: 0%;
  animation: progressAnim 8s ease-in-out forwards;
}
@keyframes progressAnim {
  0% { width: 0%; }
  30% { width: 45%; }
  60% { width: 70%; }
  90% { width: 88%; }
  100% { width: 95%; }
}

/* Photo widget */
.photo-widget {
  flex: 1;
  border-radius: 20px;
  overflow: hidden;
  position: relative;
  min-height: 120px;
  background: rgba(0,0,0,0.3);
}
.photo-widget-img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.photo-widget-placeholder {
  width: 100%; height: 100%;
  background: linear-gradient(135deg, #C0C4CC, #8EA6B8);
  display: flex; align-items: center; justify-content: center;
  font-size: 40px;
}
.photo-widget-label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 8px 12px;
  background: linear-gradient(transparent, rgba(0,0,0,0.6));
  display: flex; align-items: center; gap: 6px;
  font-size: 12px;
  opacity: 0.9;
}

/* Diary card */
.diary-card {
  background: rgba(255,255,255,0.78);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 16px;
  color: #2C2C2E;
}
.diary-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.diary-header-left {
  display: flex; align-items: center; gap: 6px;
  font-size: 14px;
  font-weight: 500;
}
.diary-header-left .count {
  color: #8E8E93;
}
.diary-time {
  font-size: 13px;
  color: #8E8E93;
}
.diary-text {
  font-size: 14px;
  line-height: 1.6;
  color: #3a3a3c;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Bottom dock */
.dock {
  display: flex;
  justify-content: center;
  gap: 24px;
  padding: 12px 0 8px;
}
.dock-icon {
  width: 56px; height: 56px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s;
  cursor: default;
  overflow: hidden;
}
.dock-icon:active { transform: scale(0.9); }
.dock-icon.clickable { cursor: pointer; }
.dock-icon img {
  width: 100%; height: 100%;
  object-fit: cover;
}

/* Page transition */
.page-transition {
  position: absolute; inset: 0;
  z-index: 100;
  background: #000;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.page-transition.active {
  opacity: 1;
  pointer-events: auto;
}
</style>
</head>
<body>

<div class="phone">
  <div class="wallpaper" id="wallpaper"></div>

  <!-- Status bar -->
  <div class="status-bar">
    <span>9:41</span>
    <div class="status-right">
      <span>📶</span>
      <span>📡</span>
      <span>🔋</span>
    </div>
  </div>

  <!-- Top-right actions -->
  <div class="top-actions">
    <button>🔓</button>
    <button>✕</button>
  </div>

  <!-- Clock -->
  <div class="clock-area">
    <div class="clock-time" id="clockTime">12:29</div>
    <div class="clock-sub">和 TA 相遇的第 345 天</div>
  </div>

  <!-- Bottom content -->
  <div class="content">

    <!-- Widget row -->
    <div class="widget-row">
      <!-- Music widget — clickable -->
      <div class="music-widget" id="musicWidget" onclick="goToPlayer()">
        <div class="music-widget-top">
          <div class="music-widget-avatar">🎵</div>
          <div class="music-widget-title">默认展示第一个昵称标...</div>
        </div>
        <div class="music-widget-controls">
          <span>⏮</span>
          <span>▶</span>
          <span>⏭</span>
        </div>
        <div class="music-widget-updating">
          <div class="updating-spinner"></div>
          <div class="updating-text">音乐生成中...</div>
          <div class="updating-progress"><div class="updating-progress-fill"></div></div>
        </div>
      </div>

      <!-- Photo widget — static, NPC avatar -->
      <div class="photo-widget">
        <img class="photo-widget-img" id="photoWidgetImg" src="" alt="">
        <div class="photo-widget-label">
          <span>🖼</span> 相册 345
        </div>
      </div>
    </div>

    <!-- Diary card — static -->
    <div class="diary-card">
      <div class="diary-header">
        <div class="diary-header-left">
          🐾 TA的日记 <span class="count">12</span>
        </div>
        <div class="diary-time">21:59</div>
      </div>
      <div class="diary-text">
        又把小毯子拖到了门口。主人说我老是喜欢守着门，可我只是觉得——那里离她最近有时候风从外面吹进来，带着一点她的味道，我就会安静下来...
      </div>
    </div>

    <!-- Bottom dock -->
    <div class="dock">
      <div class="dock-icon"><img src="icons/gallery.png" alt="相册"></div>
      <div class="dock-icon"><img src="icons/messages.png" alt="短信"></div>
      <div class="dock-icon clickable" onclick="goToPlayer()"><img src="icons/music.png" alt="音乐"></div>
      <div class="dock-icon"><img src="icons/notes.png" alt="日记"></div>
    </div>
  </div>

  <div class="page-transition" id="pageTransition"></div>
</div>

<script>
// Update clock to real time
function updateClock() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2, '0');
  const m = now.getMinutes().toString().padStart(2, '0');
  document.getElementById('clockTime').textContent = h + ':' + m;
}
updateClock();
setInterval(updateClock, 30000);

// Load first song info into music widget
async function loadWidgetInfo() {
  try {
    const resp = await fetch('playlist_entries.json');
    const data = await resp.json();
    if (data.length > 0) {
      const song = data[0];
      const avatar = document.querySelector('.music-widget-avatar');
      avatar.innerHTML = `<img src="${song.avatar}" alt="">`;
      document.querySelector('.music-widget-title').textContent = song.name;
      // NPC avatar → photo widget + wallpaper
      document.getElementById('photoWidgetImg').src = song.avatar;
      document.getElementById('wallpaper').style.background =
        `url('${song.avatar}') center/cover no-repeat`;
    }
  } catch(e) { console.log('Widget load failed', e); }
}
loadWidgetInfo();

// Navigate to music player
function goToPlayer() {
  // Don't navigate if updating
  if (document.getElementById('musicWidget').classList.contains('updating')) return;
  const t = document.getElementById('pageTransition');
  t.classList.add('active');
  setTimeout(() => {
    window.location.href = 'music-player.html';
  }, 300);
}

// Check if returning from update
function checkUpdatingState() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('updating') === 'true') {
    const widget = document.getElementById('musicWidget');
    widget.classList.add('updating');
    // Simulate generation complete after ~10 seconds
    setTimeout(() => {
      widget.classList.remove('updating');
      // Show completion state briefly
      const title = widget.querySelector('.music-widget-title');
      if (title) title.textContent = '✨ 新歌曲已生成！';
    }, 10000);
  }
}
checkUpdatingState();
</script>
</body>
</html>
