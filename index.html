<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Music Player</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: rgba(255,255,255,0.95);
  --secondary: rgba(255,255,255,0.6);
  --glass: rgba(0,0,0,0.35);
  --glass-light: rgba(255,255,255,0.08);
  --accent: #a78bfa;
  --diamond: #5ee7f7;
  --locked: rgba(255,255,255,0.35);
}

body {
  font-family: -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif;
  height: 100vh; width: 100vw;
  overflow: hidden;
  color: var(--primary);
  -webkit-font-smoothing: antialiased;
}

.bg {
  position: fixed; inset: 0;
  background-size: cover;
  background-position: center top;
  filter: brightness(0.7);
  z-index: -2;
  transition: background-image 0.8s ease;
}
.bg-overlay {
  position: fixed; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.75) 100%);
  z-index: -1;
}

.player {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 0 24px 40px;
  position: relative;
}

/* Top bar */
.top-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  padding: 50px 24px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.top-bar button {
  background: none; border: none;
  color: var(--primary);
  font-size: 20px;
  cursor: pointer;
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  transition: background 0.2s;
}
.top-bar button:hover { background: var(--glass-light); }
.top-bar .title-text {
  font-size: 14px;
  color: var(--secondary);
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* Diamond balance */
.diamond-balance {
  position: absolute;
  top: 50px; right: 70px;
  display: flex; align-items: center; gap: 4px;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 13px;
  color: var(--diamond);
}

/* Character avatar - hidden, using full-screen bg instead */
.avatar-area {
  display: none;
}
.avatar-img {
  display: none;
}

/* Song info */
.song-info {
  text-align: center;
  margin-bottom: 20px;
}
.song-name {
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}
.song-artist {
  font-size: 14px;
  color: var(--secondary);
}
.song-type-tag {
  display: inline-block;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  margin-top: 6px;
  background: rgba(167,139,250,0.2);
  color: var(--accent);
  border: 1px solid rgba(167,139,250,0.3);
}

/* Lyrics */
.lyrics-container {
  height: 200px;
  overflow-y: auto;
  margin-bottom: 24px;
  text-align: center;
  transition: all 0.4s ease;
  scrollbar-width: none;
}
.lyrics-container::-webkit-scrollbar { display: none; }
.lyrics-container.hidden { height: 0; opacity: 0; margin-bottom: 0; }
.lyrics-line {
  font-size: 14px;
  line-height: 2.2;
  color: var(--secondary);
  transition: all 0.3s;
}
.lyrics-line.active {
  color: var(--primary);
  font-size: 16px;
  font-weight: 500;
}

/* Progress */
.progress-area { margin-bottom: 18px; position: relative; }
.progress-bar {
  width: 100%; height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
}
.progress-bar:hover { height: 6px; }
.progress-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 2px;
  width: 0%;
  position: relative;
  transition: width 0.1s linear;
}
.progress-fill::after {
  content: '';
  position: absolute;
  right: -6px; top: 50%;
  transform: translateY(-50%);
  width: 12px; height: 12px;
  background: white;
  border-radius: 50%;
  opacity: 0;
  transition: opacity 0.2s;
}
.progress-bar:hover .progress-fill::after { opacity: 1; }
.progress-lock-marker {
  position: absolute;
  top: -8px;
  transform: translateX(-50%);
  font-size: 12px;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.progress-lock-marker.show { opacity: 1; }
.time-info {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
  font-size: 12px;
  color: var(--secondary);
}

/* Controls */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 28px;
  margin-bottom: 18px;
}
.controls button {
  background: none; border: none;
  color: var(--primary);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s, opacity 0.2s;
}
.controls button:active { transform: scale(0.9); }
.controls .small-btn {
  font-size: 22px;
  width: 44px; height: 44px;
  opacity: 0.7;
}
.controls .small-btn:hover { opacity: 1; }
.controls .play-btn {
  width: 64px; height: 64px;
  background: var(--primary);
  color: #111;
  border-radius: 50%;
  font-size: 26px;
}
.controls .play-btn:hover { transform: scale(1.05); }
.controls .skip-btn {
  font-size: 28px;
  width: 48px; height: 48px;
  opacity: 0.85;
}
.controls .skip-btn:hover { opacity: 1; }

/* Bottom bar */
.bottom-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.bottom-bar button {
  background: none; border: none;
  color: var(--secondary);
  font-size: 20px;
  cursor: pointer;
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  transition: all 0.2s;
}
.bottom-bar button:hover { color: var(--primary); }
.bottom-bar button.active { color: var(--accent); }

/* Playlist panel */
.playlist-panel {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(20,20,30,0.95);
  backdrop-filter: blur(20px);
  border-radius: 20px 20px 0 0;
  padding: 20px 24px 40px;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  z-index: 100;
  max-height: 65vh;
  overflow-y: auto;
}
.playlist-panel.show { transform: translateY(0); }
.playlist-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.playlist-header h3 { font-size: 16px; font-weight: 600; }
.playlist-header .close-btn {
  background: none; border: none;
  color: var(--secondary);
  font-size: 18px;
  cursor: pointer;
}
.playlist-item {
  display: flex;
  align-items: center;
  padding: 10px 8px;
  cursor: pointer;
  transition: background 0.2s;
  border-radius: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  gap: 12px;
}
.playlist-item:hover { background: rgba(255,255,255,0.05); }
.playlist-item.active { color: var(--accent); }
.playlist-item .pl-avatar {
  width: 44px; height: 44px;
  border-radius: 10px;
  object-fit: cover;
  flex-shrink: 0;
}
.playlist-item .info { flex: 1; min-width: 0; }
.playlist-item .info .name {
  font-size: 14px;
  margin-bottom: 2px;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.playlist-item .info .artist {
  font-size: 12px;
  color: var(--secondary);
}
.playlist-item .lock-price {
  display: flex; align-items: center; gap: 4px;
  font-size: 12px;
  color: var(--diamond);
  background: rgba(94,231,247,0.1);
  padding: 3px 10px;
  border-radius: 12px;
  border: 1px solid rgba(94,231,247,0.2);
  flex-shrink: 0;
}
.new-tag {
  font-size: 10px;
  background: linear-gradient(135deg, #ff6b6b, #ffa94d);
  color: white;
  padding: 1px 6px;
  border-radius: 6px;
  font-weight: 600;
}
.playlist-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 99;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.playlist-overlay.show { opacity: 1; pointer-events: auto; }

/* Play mode indicator */
.play-mode-text {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: var(--glass);
  backdrop-filter: blur(10px);
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 13px;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 50;
}
.play-mode-text.show { opacity: 1; }

/* Unlock modal */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal {
  background: rgba(30,30,45,0.95);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 28px 32px;
  width: 300px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.1);
  transform: scale(0.9);
  transition: transform 0.3s;
}
.modal-overlay.show .modal { transform: scale(1); }
.modal h3 { font-size: 18px; margin-bottom: 8px; }
.modal .modal-avatar {
  width: 80px; height: 80px;
  border-radius: 14px;
  object-fit: cover;
  margin: 0 auto 12px;
  display: block;
  border: 2px solid rgba(255,255,255,0.1);
}
.modal .modal-song-name {
  font-size: 15px;
  color: var(--secondary);
  margin-bottom: 16px;
}
.modal .price-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 28px;
  font-weight: 700;
  color: var(--diamond);
  margin-bottom: 6px;
}
.modal .balance-row {
  font-size: 13px;
  color: var(--secondary);
  margin-bottom: 24px;
}
.modal .btn-row { display: flex; gap: 12px; }
.modal .btn {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s;
}
.modal .btn:active { transform: scale(0.95); }
.modal .btn-cancel {
  background: rgba(255,255,255,0.1);
  color: var(--secondary);
}
.modal .btn-unlock {
  background: linear-gradient(135deg, #a78bfa, #818cf8);
  color: white;
}
.modal .btn-unlock.insufficient {
  background: linear-gradient(135deg, #f97316, #ef4444);
}

/* Toast */
.toast {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(94,231,247,0.15);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(94,231,247,0.3);
  color: var(--diamond);
  padding: 10px 24px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: 500;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 300;
}
.toast.show { opacity: 1; }
</style>
</head>

let currentIndex = 0;
let playMode = 'list';
let lyricsVisible = true;
let modeTimeout, toastTimeout;
let pendingUnlockIndex = -1;

function updateDiamondDisplay() {
  document.getElementById('diamondCount').textContent = userDiamonds;
}

function loadTrack(index) {
  currentIndex = index;
  const track = playlist[index];
  audio.src = track.src;
  songNameEl.textContent = track.name;
  songArtistEl.textContent = track.artist;
  songTypeTag.textContent = track.genre + ' · ' + track.typeLabel;
  avatarImg.src = track.avatar;
  bgLayer.style.backgroundImage = `url('${track.avatar}')`;
  renderLyrics(track.lyrics);
  renderPlaylist();
  updateLockMarker();
}

function updateLockMarker() {
  const track = playlist[currentIndex];
  if (!track.unlocked && audio.duration) {
    const pct = (track.previewDuration / audio.duration) * 100;
    lockMarker.style.left = pct + '%';
    lockMarker.classList.add('show');
  } else {
    lockMarker.classList.remove('show');
  }
}

function renderLyrics(lyrics) {
  if (!lyrics || lyrics.length === 0) {
    lyricsContainer.innerHTML = '<div class="lyrics-line" style="margin-top:40px;color:var(--secondary)">暂无歌词</div>';
    return;
  }
  lyricsContainer.innerHTML = lyrics.map((l, i) =>
    `<div class="lyrics-line" data-index="${i}">${l.text}</div>`
  ).join('');
}

function renderPlaylist() {
  document.getElementById('playlistCount').textContent = playlist.length;
  document.getElementById('playlistContent').innerHTML = playlist.map((t, i) => {
    const isActive = i === currentIndex;
    const lockHtml = t.unlocked ? '' : `<div class="lock-price">🔒 💎${t.price}</div>`;
    const newHtml = t.isNew ? '<span class="new-tag">NEW</span>' : '';
    return `<div class="playlist-item ${isActive ? 'active' : ''}" onclick="handleTrackClick(${i})">
      <img class="pl-avatar" src="${t.avatar}" alt="${t.character}">
      <div class="info">
        <div class="name">${t.name} ${newHtml}</div>
        <div class="artist">${t.artist}</div>
      </div>
      ${lockHtml}
    </div>`;
  }).join('');
}

function handleTrackClick(index) {
  const track = playlist[index];
  if (track.unlocked) { playTrack(index); }
  else { showUnlockModal(index); }
}

function showUnlockModal(index) {
  pendingUnlockIndex = index;
  const track = playlist[index];
  document.getElementById('modalAvatar').src = track.avatar;
  document.getElementById('modalSongName').textContent = `${track.character}《${track.name}》`;
  document.getElementById('modalPrice').textContent = track.price;
  document.getElementById('modalBalance').textContent = userDiamonds;
  const btn = document.getElementById('modalUnlockBtn');
  if (userDiamonds >= track.price) {
    btn.textContent = '解锁';
    btn.classList.remove('insufficient');
  } else {
    btn.textContent = '去充值';
    btn.classList.add('insufficient');
  }
  document.getElementById('unlockModal').classList.add('show');
}

function closeModal() {
  document.getElementById('unlockModal').classList.remove('show');
  pendingUnlockIndex = -1;
}

function confirmUnlock() {
  if (pendingUnlockIndex < 0) return;
  const track = playlist[pendingUnlockIndex];
  if (userDiamonds < track.price) {
    showToast('💎 钻石不足，请先充值');
    closeModal(); return;
  }
  userDiamonds -= track.price;
  track.unlocked = true;
  updateDiamondDisplay();
  closeModal();
  showToast('🎵 解锁成功！');
  playTrack(pendingUnlockIndex);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => toast.classList.remove('show'), 1500);
}

function togglePlay() {
  if (audio.paused) { audio.play(); playBtn.textContent = '⏸'; }
  else { audio.pause(); playBtn.textContent = '▶'; }
}

function playTrack(index) {
  loadTrack(index);
  audio.play();
  playBtn.textContent = '⏸';
  document.getElementById('playlistPanel').classList.remove('show');
  document.getElementById('playlistOverlay').classList.remove('show');
}

function prevTrack() {
  let idx = currentIndex - 1;
  if (idx < 0) idx = playlist.length - 1;
  loadTrack(idx);
  if (playlist[idx].unlocked) { audio.play(); playBtn.textContent = '⏸'; }
}

function nextTrack() {
  let idx;
  if (playMode === 'shuffle') { idx = Math.floor(Math.random() * playlist.length); }
  else { idx = (currentIndex + 1) % playlist.length; }
  loadTrack(idx);
  if (playlist[idx].unlocked) { audio.play(); playBtn.textContent = '⏸'; }
}

function togglePlayMode() {
  const modes = ['list', 'single', 'shuffle'];
  const icons = ['🔁', '🔂', '🔀'];
  const labels = ['列表循环', '单曲循环', '随机播放'];
  const idx = (modes.indexOf(playMode) + 1) % modes.length;
  playMode = modes[idx];
  modeBtn.textContent = icons[idx];
  modeText.textContent = labels[idx];
  modeText.classList.add('show');
  clearTimeout(modeTimeout);
  modeTimeout = setTimeout(() => modeText.classList.remove('show'), 1200);
}

function toggleLyrics() {
  lyricsVisible = !lyricsVisible;
  lyricsContainer.classList.toggle('hidden', !lyricsVisible);
  document.getElementById('lyricsToggle').style.color =
    lyricsVisible ? 'var(--accent)' : 'var(--secondary)';
}

function togglePlaylist() {
  document.getElementById('playlistPanel').classList.toggle('show');
  document.getElementById('playlistOverlay').classList.toggle('show');
}

function seekTo(e) {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const targetTime = pct * audio.duration;
  const track = playlist[currentIndex];
  if (!track.unlocked && targetTime > track.previewDuration) {
    showUnlockModal(currentIndex); return;
  }
  audio.currentTime = targetTime;
}

function formatTime(s) {
  if (isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

audio.addEventListener('timeupdate', () => {
  const track = playlist[currentIndex];
  const pct = (audio.currentTime / audio.duration) * 100;
  progressFill.style.width = pct + '%';
  currentTimeEl.textContent = formatTime(audio.currentTime);

  if (!track.unlocked && audio.currentTime >= track.previewDuration) {
    audio.pause(); playBtn.textContent = '▶';
    showUnlockModal(currentIndex); return;
  }

  if (track.lyrics && track.lyrics.length > 0) {
    let activeIdx = 0;
    for (let i = track.lyrics.length - 1; i >= 0; i--) {
      if (audio.currentTime >= track.lyrics[i].time) { activeIdx = i; break; }
    }
    const lines = lyricsContainer.querySelectorAll('.lyrics-line');
    lines.forEach((l, i) => {
      l.classList.toggle('active', i === activeIdx);
      if (i === activeIdx) { l.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
    });
  }
});

audio.addEventListener('loadedmetadata', () => {
  totalTimeEl.textContent = formatTime(audio.duration);
  updateLockMarker();
});

audio.addEventListener('ended', () => {
  if (playMode === 'single') { audio.currentTime = 0; audio.play(); }
  else { nextTrack(); }
});

// Init
loadTrack(0);
document.getElementById('lyricsToggle').style.color = 'var(--accent)';
updateDiamondDisplay();
</script>
